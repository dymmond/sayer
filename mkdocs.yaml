site_name: Sayer
site_description: The click running on steroids.
site_url: https://sayer.dymmond.com
docs_dir: docs/generated
site_dir: site

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - scheme: default
      primary: amber
      accent: red
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      primary: amber
      accent: red
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode
  favicon: statics/images/favicon.ico
  logo: statics/images/logo-white.png
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.code.select
    - navigation.indexes
    - navigation.path

repo_name: dymmond/sayer
repo_url: https://github.com/dymmond/sayer
edit_uri: ""
extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - meta-descriptions:
      export_csv: false
      quiet: false
      enable_checks: false
      min_length: 50
      max_length: 160
      trim: false

nav:
  - Overview: index.md
  - Start Here:
      - start-here.md
      - getting-started.md
  - Tutorials:
      - tutorials/index.md
      - tutorials/01-first-cli.md
      - tutorials/02-multi-command-app.md
      - tutorials/03-state-middleware-testing.md
  - How-to Guides:
      - how-to/index.md
      - how-to/add-a-command.md
      - how-to/organize-groups-subapps.md
      - how-to/use-parameters.md
      - how-to/build-plugin.md
      - how-to/test-cli.md
  - Concepts:
      - concepts/index.md
      - concepts/architecture.md
      - concepts/command-lifecycle.md
      - concepts/parameter-system.md
      - concepts/state-and-injection.md
      - concepts/middleware-model.md
  - Features (Deep Dives):
      - features/sayer-and-apps.md
      - features/settings.md
      - features/commands.md
      - features/groups.md
      - features/callbacks.md
      - features/params.md
      - features/middleware.md
      - features/state.md
      - features/context-injection.md
      - features/encoders.md
      - features/logging.md
      - features/builtin-commands.md
      - features/testing.md
      - features/plugins.md
      - features/terminal-helpers.md
  - API Reference:
      - api-reference/sayer.md
      - api-reference/params.md
      - api-reference/middleware.md
      - api-reference/encoders.md
      - Configuration:
          - api-reference/conf/global-settings.md
          - api-reference/conf/settings.md
      - Core:
          - api-reference/core/commands.md
          - api-reference/core/engine.md
          - api-reference/core/groups.md
          - api-reference/core/logging.md
          - api-reference/core/plugins.md
      - Utils:
          - api-reference/utils/config.md
          - api-reference/utils/console.md
          - api-reference/utils/loader.md
          - api-reference/utils/ui.md
          - api-reference/utils/ui-helpers.md
  - Workflows:
      - workflows/dev-loop.md
  - Troubleshooting: troubleshooting.md
  - Contributing: contributing.md
  - Sponsorship: sponsorship.md
  - Release Notes: release-notes.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format ""
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/dymmond/sayer
    - icon: fontawesome/brands/discord
      link: https://discord.gg/XVeWXSrJ
  alternate:
    - link: /
      name: English
      lang: en
